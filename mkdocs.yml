---
site_name: "OP System Documentation"

theme: material
plugins:
  - search        # Standard search plugin (usually enabled by default)
  - mkdocstrings: # Pulls documentation from your source code
      handlers:
        python:
          paths: [src/op_system/] # Points to where your op_system code lives

nav:
