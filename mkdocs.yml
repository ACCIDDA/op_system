  - Explanation:
      - Basic usage: explanation/Basic_usage.md
      - Core Concepts: explanation/concepts.md
      - Design Prinicples: explanation/design_principles.md
      - Metadata Preservation: explanation/metadata_preservation.md
      - Safety & Validation: explanation/safety_&_validation.md
  - Guides:
      - Getting Started: guides/getting-started.md
  - Reference:
      - API: reference/api.md